name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Release ${{ steps.get_version.outputs.version }}

            ### Changes
            - See commit history for details

            ### Installation
            ```bash
            cargo install superharness-cli --version ${{ steps.get_version.outputs.version }}
            ```
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish sh-layer0
        run: cargo publish --package sh-layer0 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for layer0
        run: sleep 30

      - name: Publish sh-layer1
        run: cargo publish --package sh-layer1 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for layer1
        run: sleep 30

      - name: Publish sh-layer2
        run: cargo publish --package sh-layer2 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for layer2
        run: sleep 30

      - name: Publish sh-layer3
        run: cargo publish --package sh-layer3 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for layer3
        run: sleep 30

      - name: Publish sh-layer4
        run: cargo publish --package sh-layer4 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for layer4
        run: sleep 30

      - name: Publish sh-core
        run: cargo publish --package sh-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for sh-core
        run: sleep 30

      - name: Publish superharness-cli
        run: cargo publish --package superharness-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

  build-release:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    needs: [create-release]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/superharness
            target/release/superharness.exe
