name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          cd python
          python -m build

      - name: Check package
        run: |
          cd python
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: python/dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.ref, '-')  # Pre-release versions (e.g., v1.0.0-beta)
    environment:
      name: testpypi
      url: https://test.pypi.org/project/continuum-agent-sdk/
    permissions:
      id-token: write  # OIDC authentication
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: "!contains(github.ref, '-')"  # Stable releases only
    environment:
      name: pypi
      url: https://pypi.org/project/continuum-agent-sdk/
    permissions:
      id-token: write  # OIDC authentication
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-install:
    name: Verify Installation
    runs-on: ${{ matrix.os }}
    needs: [publish-pypi]
    if: "!contains(github.ref, '-')"
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Install from PyPI
        run: pip install continuum-agent-sdk

      - name: Verify import
        run: |
          python -c "from continuum import Agent; print('Import OK')"
          python -c "from continuum_sdk.agent import IntelligentAgent; print('SDK Import OK')"
