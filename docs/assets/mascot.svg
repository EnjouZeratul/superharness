<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="300" height="350">
  <defs>
    <!-- Body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="mascotAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="70%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </radialGradient>
    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Glow -->
    <filter id="mascotGlow">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Character: "Nova" - A friendly AI agent assistant -->

  <!-- Shadow under the character -->
  <ellipse cx="150" cy="335" rx="60" ry="10" fill="#000" opacity="0.2"/>

  <!-- Body - Rounded robot shape -->
  <ellipse cx="150" cy="220" rx="70" ry="90" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Head -->
  <circle cx="150" cy="100" r="65" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Face screen -->
  <ellipse cx="150" cy="100" rx="50" ry="40" fill="#0d1b2a" stroke="url(#mascotAccent)" stroke-width="2"/>

  <!-- Eyes - Animated-looking digital eyes -->
  <!-- Left eye -->
  <ellipse cx="125" cy="95" rx="12" ry="14" fill="url(#eyeGlow)" filter="url(#mascotGlow)"/>
  <ellipse cx="127" cy="93" rx="4" ry="5" fill="#fff" opacity="0.9"/>

  <!-- Right eye -->
  <ellipse cx="175" cy="95" rx="12" ry="14" fill="url(#eyeGlow)" filter="url(#mascotGlow)"/>
  <ellipse cx="177" cy="93" rx="4" ry="5" fill="#fff" opacity="0.9"/>

  <!-- Friendly smile - curved line -->
  <path d="M 130 115 Q 150 130, 170 115"
        fill="none"
        stroke="url(#mascotAccent)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Antenna - represents AI/Antenna -->
  <line x1="150" y1="35" x2="150" y2="55" stroke="#00d9ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="30" r="8" fill="url(#mascotAccent)" filter="url(#mascotGlow)"/>

  <!-- Antenna glow rings -->
  <circle cx="150" cy="30" r="12" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
  <circle cx="150" cy="30" r="16" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>

  <!-- Arms -->
  <!-- Left arm -->
  <ellipse cx="80" cy="200" rx="15" ry="35" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
  <circle cx="80" cy="230" r="12" fill="url(#bodyGrad)" stroke="url(#mascotAccent)" stroke-width="2"/>

  <!-- Right arm - raised in greeting -->
  <ellipse cx="220" cy="180" rx="15" ry="35" fill="url(#bodyGrad)" filter="url(#softShadow)" transform="rotate(30 220 180)"/>
  <circle cx="235" cy="155" r="12" fill="url(#bodyGrad)" stroke="url(#mascotAccent)" stroke-width="2"/>

  <!-- Chest display - shows the logo mark -->
  <circle cx="150" cy="200" r="30" fill="#0d1b2a" stroke="url(#mascotAccent)" stroke-width="2"/>

  <!-- Mini continuum symbol on chest -->
  <path d="M 135 190 Q 125 200, 135 210" fill="none" stroke="url(#mascotAccent)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 165 190 Q 175 200, 165 210" fill="none" stroke="url(#mascotAccent)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="200" r="5" fill="url(#mascotAccent)"/>

  <!-- Legs -->
  <ellipse cx="120" cy="300" rx="20" ry="30" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
  <ellipse cx="180" cy="300" rx="20" ry="30" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Feet -->
  <ellipse cx="120" cy="325" rx="25" ry="10" fill="url(#bodyGrad)" stroke="url(#mascotAccent)" stroke-width="1"/>
  <ellipse cx="180" cy="325" rx="25" ry="10" fill="url(#bodyGrad)" stroke="url(#mascotAccent)" stroke-width="1"/>

  <!-- Floating particles around the mascot - represents data/continuity -->
  <circle cx="60" cy="80" r="3" fill="#00d9ff" opacity="0.6"/>
  <circle cx="240" cy="120" r="2" fill="#00ff88" opacity="0.5"/>
  <circle cx="250" cy="250" r="3" fill="#00d9ff" opacity="0.4"/>
  <circle cx="50" cy="270" r="2" fill="#00ff88" opacity="0.5"/>

  <!-- Connection lines from antenna -->
  <path d="M 150 30 Q 100 20, 60 80" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <path d="M 150 30 Q 200 40, 240 120" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
</svg>
